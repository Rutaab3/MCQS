<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semester Exam Prep — Quiz</title>
  <!-- Localized Libraries -->
  <link rel="stylesheet" href="libraries/css/google-fonts.css">
  <link rel="stylesheet" href="libraries/css/material-symbols.css">
  <link rel="stylesheet" href="cascading style sheet/app.css">
</head>

<body>

  <nav>
    <div class="nav-content">
      <div class="brand">
        <div>
          <h1 class="gemini-title">Exam</h1>
          <div class="dots-container">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
        </div>
        <span id="progress-badge" class="badge">0 / 0 Answered</span>
      </div>

      <div style="display: flex; align-items: center; gap: 8px;">
        <div id="score-display" class="badge" style="background:#0842A0; color:white; display:none;">Score: 0 / 0</div>
        <button id="toggle-answers" class="btn-tonal" title="Toggle Answers">
          <span class="material-symbols-rounded" id="eye-icon">visibility</span>
          <span id="btn-text">Show Answers</span>
        </button>
        <button id="themeToggle" class="btn-icon" title="Toggle Dark Mode">
          <span class="material-symbols-rounded" id="themeIcon">light_mode</span>
        </button>
      </div>
    </div>
  </nav>

  <main>
    <div class="filter-bar">
      <h2>Questions Filter</h2>
      <div style="position: relative;">
        <select id="questions-per-page">
          <option value="all">All Questions</option>
          <option value="10">10 at a time</option>
          <option value="20">20 at a time</option>
          <option value="30">30 at a time</option>
        </select>
        <span class="material-symbols-rounded"
          style="position: absolute; right: 10px; top: 8px; pointer-events: none; font-size: 20px;">expand_more</span>
      </div>
    </div>

    <div id="quiz-container">
      <!-- Questions will be injected here -->
    </div>
  </main>

  <div id="action-footer" class="hidden">
    <span id="footer-status" class="body-medium">0 questions answered on this page.</span>
    <button id="finish-btn" class="btn-filled" style="height: 40px; font-size: 13px;">
      Finish & Evaluate
    </button>
  </div>

  <footer>
    <span>Made By <a href="https://github.com/Rutaab3">github.com/Rutaab3</a></span>
  </footer>

  <script src="javascript/data.js"></script>
  <script src="javascript/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered', reg))
          .catch(err => console.error('Service Worker registration failed', err));
      });
    }
  </script>
</body>

</html>
