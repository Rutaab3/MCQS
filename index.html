        let state = {
            showAnswers: false,
            userAnswers: {},
            limit: 'all',
            currentPage: 1
        };

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            let questionsToRender = quizData;
            
            if (state.limit !== 'all') {
                const limit = parseInt(state.limit);
                const startIndex = (state.currentPage - 1) * limit;
                const endIndex = startIndex + limit;
                questionsToRender = quizData.slice(startIndex, endIndex);
            }

            let html = questionsToRender.map((q, idx) => {
                const userChoice = state.userAnswers[q.id];
                const globalIndex = quizData.findIndex(item => item.id === q.id);
                
                return `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 sm:p-8 mb-8 relative overflow-hidden">
                        <div class="flex items-start space-x-4 mb-6">
                            <div class="flex-shrink-0 bg-indigo-100 text-indigo-700 font-bold rounded-full h-8 w-8 flex items-center justify-center">
                                ${globalIndex + 1}
                            </div>
                            <h2 class="text-lg font-medium text-gray-900 leading-snug">
                                ${q.question}
                            </h2>
                        </div>
                        <div class="space-y-3">
                            ${q.options.map(option => renderOption(q, option, userChoice)).join('')}
                        </div>
                    </div>
                `;
            }).join('');
            
            if (state.limit !== 'all') {
                const limit = parseInt(state.limit);
                const totalPages = Math.ceil(quizData.length / limit);
                
                let paginationHTML = '<div class="flex justify-center items-center space-x-4 mt-6 mb-12">';
                
                if (state.currentPage > 1) {
                    paginationHTML += '<button onclick="changePage(-1)" class="px-4 py-2 bg-indigo-100 text-indigo-700 rounded-lg hover:bg-indigo-200 transition-colors font-medium">Previous</button>';
                } else {
                    paginationHTML += '<button disabled class="px-4 py-2 bg-gray-100 text-gray-400 rounded-lg cursor-not-allowed font-medium">Previous</button>';
                }
                
                paginationHTML += '<span class="font-medium text-gray-600">Page ' + state.currentPage + ' of ' + totalPages + '</span>';
                
                if (state.currentPage < totalPages) {
                    paginationHTML += '<button onclick="changePage(1)" class="px-4 py-2 bg-indigo-100 text-indigo-700 rounded-lg hover:bg-indigo-200 transition-colors font-medium">Next</button>';
                } else {
                    paginationHTML += '<button disabled class="px-4 py-2 bg-gray-100 text-gray-400 rounded-lg cursor-not-allowed font-medium">Next</button>';
                }
                
                paginationHTML += '</div>';
                html += paginationHTML;
            }

            container.innerHTML = html;
            
            // Re-initialize icons
            lucide.createIcons();
            updateStats();
        }

        window.changePage = function(delta) {
            state.currentPage += delta;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            renderQuiz();
        };

        function renderOption(q, option, userChoice) {
            const isSelected = userChoice === option;
            const isCorrect = q.answer === option;
            let classes = "option-transition relative border rounded-lg p-4 font-medium select-none ";

            if (state.showAnswers) {
                if (isCorrect) {
                    classes += "bg-green-500 text-white border-green-600 shadow-sm";
                } else if (isSelected && !isCorrect) {
                    classes += "bg-red-500 text-white border-red-600 shadow-sm";
                } else {
                    classes += "bg-gray-50 border-gray-200 text-gray-500 opacity-60";
                }
            } else if (isSelected) {
                classes += "bg-blue-500 text-white border-blue-600 shadow-sm transform scale-[1.01]";
            } else {
                classes += "bg-white border-gray-300 text-gray-700 hover:bg-gray-50 hover:border-blue-400 cursor-pointer";
            }

            const icon = state.showAnswers && isCorrect ? '<i data-lucide="check-circle" class="w-5 h-5 text-white"></i>' : 
                         state.showAnswers && isSelected && !isCorrect ? '<i data-lucide="x-circle" class="w-5 h-5 text-white"></i>' : '';

            return `
                <div class="${classes}" onclick="handleSelect(${q.id}, '${option.replace(/'/g, "\\'")}')">
                    <div class="flex items-center justify-between">
                        <span>${option}</span>
                        ${icon}
                    </div>
                </div>
            `;
        }

        function handleSelect(qId, option) {
            if (state.showAnswers) return;
            state.userAnswers[qId] = option;
            renderQuiz();
        }

        function updateStats() {
            let currentQuestions = quizData;
            if (state.limit !== 'all') {
                const limit = parseInt(state.limit);
                const startIndex = (state.currentPage - 1) * limit;
                currentQuestions = quizData.slice(startIndex, startIndex + limit);
            }

            let answeredCount = 0;
            currentQuestions.forEach(q => {
                if (state.userAnswers[q.id]) answeredCount++;
            });

            document.getElementById('progress-badge').innerText = `${answeredCount} / ${currentQuestions.length} Answered`;
            
            const footer = document.getElementById('action-footer');
            if (answeredCount > 0 && !state.showAnswers) {
                footer.classList.remove('hidden');
                document.getElementById('footer-status').innerText = `You have answered ${answeredCount} questions on this page.`;
            } else {
                footer.classList.add('hidden');
            }

            if (state.showAnswers) {
                const score = currentQuestions.reduce((acc, q) => {
                    return acc + (state.userAnswers[q.id] === q.answer ? 1 : 0);
                }, 0);
                const scoreEl = document.getElementById('score-display');
                scoreEl.classList.remove('hidden');
                scoreEl.innerText = `Score: ${score} / ${currentQuestions.length}`;
            }
        }

        document.getElementById('toggle-answers').addEventListener('click', () => {
            state.showAnswers = !state.showAnswers;
            const btn = document.getElementById('toggle-answers');
            const text = document.getElementById('btn-text');
            
            if (state.showAnswers) {
                btn.classList.add('show-answers-active');
                btn.className = "show-answers-active flex items-center space-x-2 px-4 py-2 rounded-full font-semibold transition-all bg-white text-indigo-600 hover:bg-indigo-50 border border-white shadow-md";
                text.innerText = "Hide Correct Answers";
            } else {
                btn.classList.remove('show-answers-active');
                btn.className = "flex items-center space-x-2 px-4 py-2 rounded-full font-semibold transition-all bg-indigo-500 text-white border border-indigo-400 hover:bg-indigo-400";
                text.innerText = "Show Correct Answers";
            }
            renderQuiz();
        });

        document.getElementById('finish-btn').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            state.showAnswers = true;
            // Force the button UI state
            const btn = document.getElementById('toggle-answers');
            btn.classList.add('show-answers-active');
            btn.className = "show-answers-active flex items-center space-x-2 px-4 py-2 rounded-full font-semibold transition-all bg-white text-indigo-600 hover:bg-indigo-50 border border-white shadow-md";
            document.getElementById('btn-text').innerText = "Hide Correct Answers";
            renderQuiz();
        });

        document.getElementById('questions-per-page').addEventListener('change', (e) => {
            state.limit = e.target.value;
            state.currentPage = 1;
            renderQuiz();
        });

        // Initial Render
        renderQuiz();
    </script>
